<form action="https://formspree.io/f/YOUR_FORM_ID_HERE" 
      method="POST"
      class="space-y-6">

    <!-- Basic Information -->
    <div>
        <h3 class="text-lg font-semibold mb-4 text-[#d4af37]">Basic Information</h3>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div>
                <label class="block text-sm text-zinc-400 mb-2">Full Name *</label>
                <input type="text" name="full_name" required class="form-input w-full rounded-2xl px-5 py-3 text-white">
            </div>
            <div>
                <label class="block text-sm text-zinc-400 mb-2">Age *</label>
                <input type="number" name="age" min="18" max="65" required class="form-input w-full rounded-2xl px-5 py-3 text-white">
            </div>
        </div>

        <!-- Add all your other fields here (gender, location, email, socials, etc.) -->

        <div class="mt-5">
            <label class="block text-sm text-zinc-400 mb-2">Briefly describe your content and niche *</label>
            <textarea name="content_description" rows="4" required class="form-input w-full rounded-3xl px-5 py-4 text-white resize-y"></textarea>
        </div>

        <div>
            <label class="block text-sm text-zinc-400 mb-2">Why do you want to work with Private Talent Group? *</label>
            <textarea name="why_us" rows="4" required class="form-input w-full rounded-3xl px-5 py-4 text-white resize-y"></textarea>
        </div>
    </div>

    <button type="submit" 
            class="w-full py-4 bg-[#d4af37] hover:bg-[#c9a05f] text-black font-semibold rounded-2xl text-sm tracking-wider transition-all">
        SUBMIT APPLICATION
    </button>
</form>
